name: Merge and Tag

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - prerelease
          - preminor
          - premajor
      preid:
        description: 'Prerelease identifier (only used for pre-prefix types, e.g., alpha, beta)'
        required: false
        default: 'alpha'
        type: string

permissions:
  contents: write

jobs:
  ci-checks:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/ci-checks.yml

  bump-and-tag:
    needs: ci-checks
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version_bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Bump Type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.bump_type }}" >> $GITHUB_OUTPUT
          else
            LABELS='${{ join(github.event.pull_request.labels.*.name, ' ') }}'
            echo "Labels: $LABELS"
            if [[ $LABELS =~ "\[premajor\]" || $LABELS =~ "premajor" ]]; then
              echo "type=premajor" >> $GITHUB_OUTPUT
            elif [[ $LABELS =~ "\[preminor\]" || $LABELS =~ "preminor" ]]; then
              echo "type=preminor" >> $GITHUB_OUTPUT
            elif [[ $LABELS =~ "\[prepatch\]" || $LABELS =~ "prepatch" ]]; then
              echo "type=prepatch" >> $GITHUB_OUTPUT
            elif [[ $LABELS =~ "\[prerelease\]" || $LABELS =~ "prerelease" ]]; then
              echo "type=prerelease" >> $GITHUB_OUTPUT
            elif [[ $LABELS =~ "\[major\]" || $LABELS =~ "major" ]]; then
              echo "type=major" >> $GITHUB_OUTPUT
            elif [[ $LABELS =~ "\[minor\]" || $LABELS =~ "minor" ]]; then
              echo "type=minor" >> $GITHUB_OUTPUT
            elif [[ $LABELS =~ "\[patch\]" || $LABELS =~ "patch" ]]; then
              echo "type=patch" >> $GITHUB_OUTPUT
            else
              echo "type=none" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Bump Version and Tag
        id: version_bump
        if: steps.bump_type.outputs.type != 'none'
        run: |
          TYPE=${{ steps.bump_type.outputs.type }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          EXTRA_ARGS=""
          if [[ "$TYPE" =~ ^pre ]]; then
            PREID="${{ github.event.inputs.preid }}"
            if [ -z "$PREID" ]; then
              PREID="alpha"
            fi
            EXTRA_ARGS="--preid=$PREID"
          fi
          
          # Sync root package.json version with apps/admin/package.json version
          node -e "const fs = require('fs'); const adminPkg = JSON.parse(fs.readFileSync('apps/admin/package.json')); const rootPkg = JSON.parse(fs.readFileSync('package.json')); rootPkg.version = adminPkg.version; fs.writeFileSync('package.json', JSON.stringify(rootPkg, null, 2) + '\n');"
          
          # Bump version at the root (where there are no 'workspace:' dependencies to trigger npm errors)
          npm version $TYPE $EXTRA_ARGS --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          # Sync apps/admin/package.json version with the new version
          node -e "const fs = require('fs'); const adminPkg = JSON.parse(fs.readFileSync('apps/admin/package.json')); adminPkg.version = '$NEW_VERSION'; fs.writeFileSync('apps/admin/package.json', JSON.stringify(adminPkg, null, 2) + '\n');"
          
          git add .
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git push origin main
          
          git tag v$NEW_VERSION
          git push origin v$NEW_VERSION
          
          # Set output for release job
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  release:
    needs: bump-and-tag
    if: needs.bump-and-tag.outputs.new_version != ''
    uses: ./.github/workflows/release.yml
    with:
      tag: v${{ needs.bump-and-tag.outputs.new_version }}
    secrets: inherit
