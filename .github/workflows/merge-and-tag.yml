name: Merge and Tag

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  ci-checks:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/ci-checks.yml

  bump-and-tag:
    needs: ci-checks
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Bump Type
        id: bump_type
        run: |
          LABELS='${{ join(github.event.pull_request.labels.*.name, ' ') }}'
          echo "Labels: $LABELS"
          if [[ $LABELS =~ "\[major\]" || $LABELS =~ "major" ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ $LABELS =~ "\[minor\]" || $LABELS =~ "minor" ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ $LABELS =~ "\[patch\]" || $LABELS =~ "patch" ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Bump Version and Tag
        if: steps.bump_type.outputs.type != 'none'
        run: |
          TYPE=${{ steps.bump_type.outputs.type }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Bump apps/admin/package.json
          cd apps/admin
          npm version $TYPE --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          # Bump root package.json to match
          cd ../..
          npm version $NEW_VERSION --no-git-tag-version
          
          git add .
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git push origin main
          
          git tag v$NEW_VERSION
          git push origin v$NEW_VERSION
