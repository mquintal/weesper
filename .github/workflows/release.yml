name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.os }}
    env:
      FFMPEG_VERSION: 'n8.1.1'
      WHISPER_VERSION: 'v1.8.4'
      LLAMA_VERSION: 'b9265'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable
      
      - name: Install build dependencies (nasm)
        if: steps.cache-native-deps.outputs.cache-hit != 'true'
        run: brew install nasm

      - name: Cache Native Dependencies
        id: cache-native-deps
        uses: actions/cache@v5
        with:
          path: |
            apps/admin/resources/ffmpeg
            apps/admin/resources/whisper.cpp
            apps/admin/resources/llama.cpp
          key: native-deps-${{ runner.os }}-${{ runner.arch }}-ffmpeg-${{ env.FFMPEG_VERSION }}-whisper-${{ env.WHISPER_VERSION }}-llama-${{ env.LLAMA_VERSION }}

      - name: Build Native Dependencies
        if: steps.cache-native-deps.outputs.cache-hit != 'true'
        run: yarn build-deps

      - name: Build JS
        run: yarn build:ci
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Package with Electron Builder
        run: yarn workspace admin build:ci-electron --mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code Signing
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ matrix.arch }}
          path: |
            apps/admin/release/*/weesper_v*.dmg
            apps/admin/release/*/*.zip
            apps/admin/release/*/latest-mac.yml
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            apps/admin/release/*/weesper_v*.dmg
            apps/admin/release/*/*.zip
            apps/admin/release/*/latest-mac.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
